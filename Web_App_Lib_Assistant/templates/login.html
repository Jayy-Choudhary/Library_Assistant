<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Assistant - Admin Login</title>
    
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0B0F19;
            --surface: #121826;
            --text-primary: #F3F4F6;
            --text-secondary: #9CA3AF;
            --border: rgba(255, 255, 255, 0.06);
            --primary: #4F6FFF;
            --primary-hover: #3b5bdb;
            --danger: #EF4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 36px 32px;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.55);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), #7C3AED);
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFF 30%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background-color: rgba(255, 255, 255, 0.02);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 111, 255, 0.15);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background-color: var(--primary);
            color: #FFF;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.15s ease, transform 0.1s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        .error-alert {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: var(--danger);
            font-size: 13px;
            font-weight: 600;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 24px;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .error-icon {
            font-size: 16px;
            line-height: 1;
        }

        .public-link {
            display: inline-block;
            margin-top: 24px;
            font-size: 13px;
            font-weight: 600;
            color: var(--primary);
            text-decoration: none;
            transition: color 0.15s ease;
        }

        .public-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo">Library Assist</div>
        <p class="subtitle">Administrator Portal Login</p>
        
        {% if error %}
        <div class="error-alert">
            <span class="error-icon">⚠️</span>
            <span>{{ error }}</span>
        </div>
        {% endif %}
        
        <form method="post" action="/login">
            <div class="form-group">
                <label for="password">Portal Access Password</label>
                <input type="password" id="password" name="password" placeholder="Enter portal password" required autofocus>
            </div>
            
            <button type="submit" class="btn-submit">Sign In</button>
        </form>

        <a href="/rooms/public" class="public-link">➔ View Student Vacancy Map</a>
    </div>

</body>
</html>
